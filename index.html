<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎨 دائرة الألوان | تحدي 9 ثواني</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 12px;
            position: relative;
        }

        /* تأثير خلفية متحركة */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 2px, transparent 2px);
            background-size: 40px 40px;
            animation: bgMove 30s linear infinite;
        }

        @keyframes bgMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        .game-container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* بطاقة اللعبة */
        .game-card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 40px;
            padding: 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }

        /* شاشة الدخول */
        .lobby-screen {
            text-align: center;
            padding: 20px 10px;
        }

        .game-title {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .game-subtitle {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 30px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 14px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
            width: 80%;
            max-width: 250px;
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e, #38ef7d);
        }

        .room-input {
            padding: 12px 15px;
            font-size: 1.2rem;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            text-align: center;
            width: 140px;
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 10px;
        }

        /* رأس اللعبة */
        .game-header {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .room-code-badge {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            padding: 8px 18px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        /* لاعبان - تصميم للهاتف */
        .players-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .player-card {
            background: linear-gradient(145deg, #f0f2f5, #e4e7eb);
            border-radius: 30px;
            padding: 15px;
            transition: all 0.3s;
            position: relative;
            border: 2px solid transparent;
        }

        .player-card.active {
            background: linear-gradient(135deg, #fff9e6, #fff5e0);
            border-color: #f39c12;
            box-shadow: 0 8px 20px rgba(243,156,18,0.2);
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .player-badge {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .player-info {
            display: flex;
            flex-direction: column;
        }

        .player-label {
            font-size: 0.7rem;
            color: #888;
        }

        .player-name {
            font-size: 1.2rem;
            font-weight: 800;
        }

        .you-badge {
            background: #27ae60;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .opponent-badge {
            background: #e74c3c;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        /* خانات اللاعب */
        .player-slots {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin: 12px 0;
        }

        .color-slot {
            aspect-ratio: 1;
            border-radius: 15px;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.7rem;
            transition: all 0.3s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .color-slot.filled {
            border: 2px solid gold;
            color: white;
            text-shadow: 1px 1px 1px black;
            font-size: 0.65rem;
        }

        /* مؤقت */
        .timer-section {
            margin-top: 10px;
        }

        .timer-bar-container {
            background: #ddd;
            border-radius: 20px;
            height: 6px;
            overflow: hidden;
        }

        .timer-bar {
            height: 100%;
            background: linear-gradient(90deg, #11998e, #38ef7d);
            transition: width 0.1s linear;
            width: 100%;
        }

        .timer-bar.warning {
            background: linear-gradient(90deg, #f5576c, #f093fb);
        }

        .timer-text {
            font-size: 0.7rem;
            color: #888;
            margin-top: 5px;
            text-align: center;
        }

        /* منطقة النرد */
        .dice-area {
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            border-radius: 35px;
            padding: 18px;
            margin: 15px 0;
            text-align: center;
        }

        .dice-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .dice-card {
            background: white;
            width: 75px;
            height: 75px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }

        .dice-card span {
            font-size: 1rem;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .roll-btn {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            max-width: 200px;
        }

        .roll-btn:active {
            transform: scale(0.96);
        }

        .roll-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* الحالة */
        .status-box {
            background: #f0f2f5;
            padding: 12px;
            border-radius: 25px;
            margin: 12px 0;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .countdown-big {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            margin: 8px 0;
            font-family: monospace;
        }

        /* شبكة الخانات المخفية */
        .hidden-grid-section {
            margin-top: 20px;
        }

        .section-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 12px;
            color: #333;
            text-align: center;
        }

        .hidden-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .hidden-cell {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #34495e, #2c3e50);
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: rgba(255,255,255,0.4);
        }

        .hidden-cell:active {
            transform: scale(0.95);
        }

        /* شاشات الفوز والخسارة */
        .result-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.4s;
        }

        .result-card {
            background: linear-gradient(145deg, #fff, #f8f9fa);
            border-radius: 60px;
            padding: 40px 30px;
            text-align: center;
            max-width: 320px;
            width: 100%;
            animation: slideUp 0.4s;
        }

        .win-card {
            background: linear-gradient(145deg, #fff, #e8f5e9);
        }

        .lose-card {
            background: linear-gradient(145deg, #fff, #ffebee);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .result-emoji {
            font-size: 4.5rem;
            margin-bottom: 15px;
        }

        .result-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .result-message {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .new-game-btn {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            width: 100%;
        }

        .hidden {
            display: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .active-turn-indicator {
            position: absolute;
            top: -8px;
            right: 15px;
            background: #f39c12;
            color: white;
            font-size: 0.7rem;
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="bg-animation"></div>

<div class="game-container">
    <div class="game-card">
        <!-- شاشة الدخول -->
        <div id="lobbyScreen">
            <div class="lobby-screen">
                <div class="game-title">🎨 دائرة الألوان</div>
                <div class="game-subtitle">⏱️ 9 ثواني لكل دور | تحدى أصدقاءك</div>
                <button class="btn-primary" id="createRoomBtn">🚀 إنشاء غرفة</button>
                <div style="margin: 15px 0; color: #ccc;">━━━ أو ━━━</div>
                <input type="text" id="roomInput" class="room-input" placeholder="كود" maxlength="4">
                <button class="btn-primary btn-success" id="joinRoomBtn">🎯 انضمام</button>
            </div>
        </div>

        <!-- شاشة اللعب -->
        <div id="gameScreen" class="hidden">
            <div class="game-header">
                <div class="room-code-badge">🏠 كود: <span id="roomCode"></span></div>
            </div>

            <div class="players-area">
                <!-- اللاعب 1 (سيتم تحديثه ديناميكياً) -->
                <div class="player-card" id="player1Card">
                    <div class="player-header">
                        <div class="player-badge">
                            <div class="player-avatar" id="player1Avatar">👑</div>
                            <div class="player-info">
                                <span class="player-label" id="player1Label">اللاعب</span>
                                <span class="player-name" id="player1Name">المضيف</span>
                            </div>
                        </div>
                        <span id="player1Badge"></span>
                    </div>
                    <div class="player-slots" id="player1Slots"></div>
                    <div class="timer-section">
                        <div class="timer-bar-container">
                            <div class="timer-bar" id="player1TimerBar"></div>
                        </div>
                        <div class="timer-text" id="player1TimerText">⏱️ -- ثانية</div>
                    </div>
                </div>

                <!-- اللاعب 2 -->
                <div class="player-card" id="player2Card">
                    <div class="player-header">
                        <div class="player-badge">
                            <div class="player-avatar" id="player2Avatar">🎮</div>
                            <div class="player-info">
                                <span class="player-label" id="player2Label">اللاعب</span>
                                <span class="player-name" id="player2Name">الضيف</span>
                            </div>
                        </div>
                        <span id="player2Badge"></span>
                    </div>
                    <div class="player-slots" id="player2Slots"></div>
                    <div class="timer-section">
                        <div class="timer-bar-container">
                            <div class="timer-bar" id="player2TimerBar"></div>
                        </div>
                        <div class="timer-text" id="player2TimerText">⏱️ -- ثانية</div>
                    </div>
                </div>
            </div>

            <div class="dice-area">
                <div class="dice-container">
                    <div class="dice-card" id="dice1"><span>?</span></div>
                    <div class="dice-card" id="dice2"><span>?</span></div>
                </div>
                <button class="roll-btn" id="rollBtn">🎲 رمي النرد 🎲</button>
            </div>

            <div class="status-box" id="statusMsg">✨ جاري التحميل...</div>
            <div class="countdown-big" id="countdownDisplay"></div>

            <div class="hidden-grid-section">
                <div class="section-title">📦 اختر خانة</div>
                <div class="hidden-grid" id="hiddenGrid"></div>
            </div>
        </div>
    </div>
</div>

<!-- شاشة الفوز -->
<div id="winScreen" class="result-overlay hidden">
    <div class="result-card win-card">
        <div class="result-emoji">🏆🎉🏆</div>
        <div class="result-title" style="color: #27ae60;">فوز! 🎊</div>
        <div class="result-message" id="winMessage">مبروك! لقد جمعت كل الألوان أولاً</div>
        <div style="font-size: 2rem; margin: 10px 0;">⭐🎨✨</div>
        <button class="new-game-btn" onclick="location.reload()">🎮 لعبة جديدة</button>
    </div>
</div>

<!-- شاشة الخسارة -->
<div id="loseScreen" class="result-overlay hidden">
    <div class="result-card lose-card">
        <div class="result-emoji">😢💔😭</div>
        <div class="result-title" style="color: #e74c3c;">خسارة!</div>
        <div class="result-message" id="loseMessage">للأسف! الخصم سبقك... المرة القادمة إن شاء الله</div>
        <div style="font-size: 2rem; margin: 10px 0;">💪🎯🔥</div>
        <button class="new-game-btn" onclick="location.reload()" style="background: linear-gradient(135deg, #e74c3c, #c0392b);">🎮 جرب مرة أخرى</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCTKYD680Jdbl0azC9RTtuKZBaLX2uU_Ck",
        authDomain: "my-online-store-34f34.firebaseapp.com",
        databaseURL: "https://my-online-store-34f34-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "my-online-store-34f34",
        storageBucket: "my-online-store-34f34.firebasestorage.app",
        messagingSenderId: "288655549705",
        appId: "1:288655549705:web:06901ce4ac1a50eebe1fd8"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let roomID, role, myTurn = false, hasRolledThisTurn = false;
    let timerInterval = null;
    let currentTimeLeft = 9;

    const colorMap = {
        '#FF69B4': { name: 'وردي', ar: 'وردي' },
        '#e74c3c': { name: 'أحمر', ar: 'أحمر' },
        '#f1c40f': { name: 'أصفر', ar: 'أصفر' },
        '#3498db': { name: 'أزرق', ar: 'أزرق' },
        '#8B4513': { name: 'بني', ar: 'بني' },
        '#2ecc71': { name: 'أخضر', ar: 'أخضر' }
    };
    const hexArray = Object.keys(colorMap);

    function createSlots() {
        for(let i = 1; i <= 6; i++) {
            document.getElementById('player1Slots').innerHTML += `<div class="color-slot">${i}</div>`;
            document.getElementById('player2Slots').innerHTML += `<div class="color-slot">${i}</div>`;
        }
    }
    createSlots();

    function updatePlayerLabels() {
        if(role === 'p1') {
            document.getElementById('player1Label').innerText = '👤 أنت';
            document.getElementById('player1Badge').innerHTML = '<span class="you-badge">أنت</span>';
            document.getElementById('player2Label').innerText = '👥 الخصم';
            document.getElementById('player2Badge').innerHTML = '<span class="opponent-badge">الخصم</span>';
            document.getElementById('player1Name').innerText = 'أنا';
            document.getElementById('player2Name').innerText = 'الخصم';
        } else {
            document.getElementById('player2Label').innerText = '👤 أنت';
            document.getElementById('player2Badge').innerHTML = '<span class="you-badge">أنت</span>';
            document.getElementById('player1Label').innerText = '👥 الخصم';
            document.getElementById('player1Badge').innerHTML = '<span class="opponent-badge">الخصم</span>';
            document.getElementById('player2Name').innerText = 'أنا';
            document.getElementById('player1Name').innerText = 'الخصم';
        }
    }

    function stopTimer() {
        if(timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function startTurnTimer() {
        stopTimer();
        if(!myTurn) return;
        currentTimeLeft = 9;
        updateTimerUI();
        timerInterval = setInterval(async () => {
            if(!myTurn) { stopTimer(); return; }
            currentTimeLeft--;
            updateTimerUI();
            if(currentTimeLeft <= 0) {
                stopTimer();
                await forceEndTurn();
            }
        }, 1000);
    }

    function updateTimerUI() {
        const countdownDiv = document.getElementById('countdownDisplay');
        if(countdownDiv && myTurn) {
            countdownDiv.innerHTML = `⏱️ ${currentTimeLeft} ث`;
            countdownDiv.style.color = currentTimeLeft <= 3 ? '#e74c3c' : '#f39c12';
        }
        const barId = role === 'p1' ? 'player1TimerBar' : 'player2TimerBar';
        const bar = document.getElementById(barId);
        if(bar) {
            const percent = (currentTimeLeft / 9) * 100;
            bar.style.width = `${percent}%`;
            if(currentTimeLeft <= 3) bar.classList.add('warning');
            else bar.classList.remove('warning');
        }
        const textId = role === 'p1' ? 'player1TimerText' : 'player2TimerText';
        const text = document.getElementById(textId);
        if(text) text.innerHTML = `⏱️ ${currentTimeLeft} ثانية`;
    }

    async function forceEndTurn() {
        if(!myTurn) return;
        showMessage("⏰ انتهى الوقت!", "#f8d7da", "#721c24");
        const nextTurn = role === 'p1' ? 'p2' : 'p1';
        await db.ref('rooms/' + roomID).update({
            turn: nextTurn,
            dice: ['?', '?'],
            rev: { a: -1, b: -1 },
            hasRolled: { p1: false, p2: false }
        });
        hasRolledThisTurn = false;
        stopTimer();
    }

    document.getElementById('createRoomBtn').onclick = async () => {
        roomID = Math.floor(1000 + Math.random() * 9000).toString();
        role = 'p1';
        let gridColors = [...hexArray, ...hexArray];
        for(let i = gridColors.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [gridColors[i], gridColors[j]] = [gridColors[j], gridColors[i]];
        }
        const grid = gridColors.map(c => ({ c, m: false }));
        await db.ref('rooms/' + roomID).set({
            grid, turn: 'p1', p1Inv: [0,0,0,0,0,0], p2Inv: [0,0,0,0,0,0],
            dice: ['?', '?'], rev: { a: -1, b: -1 }, win: '', hasRolled: { p1: false, p2: false }
        });
        alert("🎫 كود الغرفة: " + roomID);
        startGame();
    };

    document.getElementById('joinRoomBtn').onclick = () => {
        roomID = document.getElementById('roomInput').value.trim();
        if(roomID.length !== 4) { alert("⚠️ كود مكون من 4 أرقام"); return; }
        role = 'p2';
        db.ref('rooms/' + roomID).once('value', s => s.exists() ? startGame() : alert("❌ غرفة غير موجودة"));
    };

    function startGame() {
        document.getElementById('lobbyScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.remove('hidden');
        document.getElementById('roomCode').innerText = roomID;
        updatePlayerLabels();
        const gridDiv = document.getElementById('hiddenGrid');
        gridDiv.innerHTML = '';
        for(let i = 0; i < 12; i++) {
            let cell = document.createElement('div');
            cell.className = 'hidden-cell';
            cell.id = 'cell-' + i;
            cell.innerHTML = '?';
            cell.onclick = () => selectCell(i);
            gridDiv.appendChild(cell);
        }
        listenToGame();
    }

    async function selectCell(i) {
        if(!myTurn) { showMessage("⏳ ليس دورك!", "#f8d7da", "#721c24"); return; }
        const snapshot = await db.ref('rooms/' + roomID).once('value');
        const data = snapshot.val();
        if(!data || data.grid[i].m) return;
        if(data.dice[0] === '?' || data.dice[1] === '?') {
            showMessage("🎲 ارمي النرد أولاً!", "#fff3cd", "#856404");
            return;
        }
        const clickedColor = data.grid[i].c;
        const diceColors = data.dice;
        const isMatch = diceColors.includes(clickedColor);
        const currentInv = role === 'p1' ? [...data.p1Inv] : [...data.p2Inv];
        const colorIndex = hexArray.indexOf(clickedColor);
        const alreadyHas = currentInv[colorIndex] === 1;
        const cell = document.getElementById('cell-' + i);
        cell.style.background = clickedColor;
        cell.innerHTML = colorMap[clickedColor].ar;
        cell.style.color = 'white';
        let updates = {};
        if(isMatch && !alreadyHas) {
            currentInv[colorIndex] = 1;
            updates[role === 'p1' ? 'p1Inv' : 'p2Inv'] = currentInv;
            updates[`grid/${i}/m`] = true;
            showMessage(`✅ حصلت على ${colorMap[clickedColor].ar}!`, "#d4edda", "#155724");
            if(!currentInv.includes(0)) { updates['win'] = role; await db.ref('rooms/' + roomID).update(updates); stopTimer(); return; }
        } else if(isMatch && alreadyHas) {
            showMessage(`⚠️ ${colorMap[clickedColor].ar} موجود! ينتقل للخصم`, "#fff3cd", "#856404");
            updates[`grid/${i}/m`] = true;
            const opponentInv = role === 'p1' ? [...data.p2Inv] : [...data.p1Inv];
            if(opponentInv[colorIndex] !== 1) {
                opponentInv[colorIndex] = 1;
                updates[role === 'p1' ? 'p2Inv' : 'p1Inv'] = opponentInv;
            }
        } else {
            showMessage(`❌ ${colorMap[clickedColor].ar} لا يطابق النرد!`, "#f8d7da", "#721c24");
        }
        const revKey = data.rev.a === -1 ? 'rev/a' : 'rev/b';
        updates[revKey] = i;
        await db.ref('rooms/' + roomID).update(updates);
        setTimeout(async () => {
            const nextTurn = role === 'p1' ? 'p2' : 'p1';
            await db.ref('rooms/' + roomID).update({ turn: nextTurn, dice: ['?', '?'], rev: { a: -1, b: -1 }, hasRolled: { p1: false, p2: false } });
            hasRolledThisTurn = false;
            stopTimer();
        }, 1500);
    }

    async function rollDice() {
        if(!myTurn) { showMessage("⏳ ليس دورك!", "#f8d7da", "#721c24"); return; }
        const snapshot = await db.ref('rooms/' + roomID).once('value');
        const data = snapshot.val();
        if(data.hasRolled && data.hasRolled[role]) { showMessage("🎲 رميت النرد مسبقاً!", "#fff3cd", "#856404"); return; }
        const dice1 = hexArray[Math.floor(Math.random() * hexArray.length)];
        const dice2 = hexArray[Math.floor(Math.random() * hexArray.length)];
        showMessage(`🎲 النرد: ${colorMap[dice1].ar} و ${colorMap[dice2].ar}`, "#d4edda", "#155724");
        await db.ref('rooms/' + roomID).update({ dice: [dice1, dice2], [`hasRolled/${role}`]: true });
        hasRolledThisTurn = true;
    }

    function listenToGame() {
        db.ref('rooms/' + roomID).on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            if(data.win) {
                stopTimer();
                if(data.win === role) {
                    document.getElementById('winMessage').innerHTML = '🎉 أنت الفائز! جمعت كل الألوان أولاً 🎉<br>🔥 مذهل! 🔥';
                    document.getElementById('winScreen').classList.remove('hidden');
                } else {
                    document.getElementById('loseMessage').innerHTML = '😢 الخصم فاز... المرة القادمة إن شاء الله 💪<br>🌟 لا تيأس، حاول مرة أخرى 🌟';
                    document.getElementById('loseScreen').classList.remove('hidden');
                }
                return;
            }
            const oldTurn = myTurn;
            myTurn = data.turn === role;
            if(myTurn && !oldTurn) { hasRolledThisTurn = false; startTurnTimer(); }
            else if(!myTurn) { stopTimer(); document.getElementById('countdownDisplay').innerHTML = ''; }
            document.getElementById('rollBtn').disabled = !myTurn || (data.hasRolled && data.hasRolled[role]);
            document.getElementById('player1Card').classList.toggle('active', data.turn === 'p1');
            document.getElementById('player2Card').classList.toggle('active', data.turn === 'p2');
            data.grid.forEach((item, i) => {
                const el = document.getElementById('cell-' + i);
                if(item.m) { el.style.visibility = 'hidden'; el.style.pointerEvents = 'none'; }
                else {
                    el.style.visibility = 'visible'; el.style.pointerEvents = 'auto';
                    if(data.rev.a === i || data.rev.b === i) {
                        el.style.background = item.c;
                        el.innerHTML = colorMap[item.c].ar;
                        el.style.color = 'white';
                    } else {
                        el.style.background = 'linear-gradient(145deg, #34495e, #2c3e50)';
                        el.innerHTML = '?';
                        el.style.color = 'rgba(255,255,255,0.4)';
                    }
                }
            });
            const updateDice = (id, col) => {
                const d = document.getElementById(id);
                if(col === '?' || !col) { d.style.background = 'white'; d.innerHTML = '<span style="color:#999;">?</span>'; }
                else { d.style.background = col; d.innerHTML = `<span>${colorMap[col].ar}</span>`; }
            };
            updateDice('dice1', data.dice[0]);
            updateDice('dice2', data.dice[1]);
            const updateSlots = (id, inv) => {
                const slots = document.getElementById(id).children;
                for(let i=0; i<inv.length; i++) {
                    if(inv[i] === 1) {
                        slots[i].style.background = hexArray[i];
                        slots[i].style.color = 'white';
                        slots[i].style.border = '2px solid gold';
                        slots[i].innerHTML = colorMap[hexArray[i]].ar;
                        slots[i].classList.add('filled');
                    } else {
                        slots[i].style.background = '#ddd';
                        slots[i].style.color = '#999';
                        slots[i].style.border = 'none';
                        slots[i].innerHTML = (i+1).toString();
                        slots[i].classList.remove('filled');
                    }
                }
            };
            updateSlots('player1Slots', data.p1Inv);
            updateSlots('player2Slots', data.p2Inv);
            const statusText = myTurn ? (data.hasRolled && data.hasRolled[role] ? "🎯 اختر خانة!" : "🎲 اضغط على النرد أولاً!") : `⏳ دور ${data.turn === 'p1' ? (role==='p1'?'أنت':'الخصم') : (role==='p2'?'أنت':'الخصم')}...`;
            document.getElementById('statusMsg').innerHTML = statusText;
        });
    }

    function showMessage(msg, bg, color) {
        const statusDiv = document.getElementById('statusMsg');
        statusDiv.innerHTML = msg;
        statusDiv.style.background = bg;
        statusDiv.style.color = color;
        setTimeout(() => {
            if(document.getElementById('statusMsg').innerHTML === msg) {
                statusDiv.style.background = '#f0f2f5';
                statusDiv.style.color = '#333';
            }
        }, 2000);
    }

    document.getElementById('rollBtn').onclick = rollDice;
</script>
</body>
</html>
